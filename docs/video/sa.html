<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sütcü İmam Branda Tekstil — Sunum</title>
  <style>
    :root {
      --bg: #000000;
      --accent: #c9a227;
      --text: #f8fafc;
      --muted: #888888;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .deck {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: var(--bg);
    }

    .slide.active {
      display: flex;
    }

    /* Kapak slaytı */
    .slide.title-slide {
      text-align: center;
      gap: 1.5rem;
    }

    .slide.title-slide .logo-mark {
      width: 220px;
      height: auto;
    }

    .slide.title-slide .logo-mark img {
      width: 100%;
      height: auto;
      display: block;
    }

    .slide.title-slide h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      max-width: 900px;
    }

    .slide.title-slide .subtitle {
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      color: var(--muted);
      max-width: 700px;
      line-height: 1.6;
    }

    .slide.title-slide .tagline {
      margin-top: 1rem;
      padding: 0.6rem 1.4rem;
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 999px;
      font-size: 0.95rem;
      color: var(--accent);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* Görsel slaytları */
    .slide.image-slide {
      padding: 1.5rem 2rem;
    }

    .slide.image-slide .frame {
      flex: 1;
      width: 100%;
      max-width: 1400px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #000;
    }

    .slide.image-slide img {
      max-width: 100%;
      max-height: calc(100vh - 5rem);
      object-fit: contain;
      display: block;
      will-change: transform;
      transform-origin: center center;
    }

    .slide.image-slide.active img {
      animation: kenBurns 5s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }

    @keyframes kenBurns {
      from { transform: scale(1); }
      to { transform: scale(1.05); }
    }

    /* Sabit logo */
    .brand-logo {
      position: fixed;
      bottom: 2rem;
      left: 2rem;
      width: 180px;
      height: auto;
      z-index: 50;
      pointer-events: none;
      opacity: 0.95;
    }

    /* Kapanış slaytı */
    .slide.end-slide {
      text-align: center;
      gap: 1rem;
    }

    .slide.end-slide h2 {
      font-size: clamp(2rem, 4vw, 3rem);
    }

    .slide.end-slide p {
      color: var(--muted);
      font-size: 1.1rem;
    }

    /* Kontroller */
    .controls {
      position: fixed;
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.55rem 1rem;
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 999px;
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .controls button {
      background: rgba(255, 255, 255, 0.08);
      border: none;
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.15s;
    }

    .controls button:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    .controls .counter {
      font-size: 0.85rem;
      color: var(--muted);
      min-width: 4.5rem;
      text-align: center;
    }

    .controls .hint {
      font-size: 0.75rem;
      color: var(--muted);
      padding-left: 0.5rem;
      border-left: 1px solid rgba(148, 163, 184, 0.25);
    }

    .progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: var(--accent);
      transition: width 0.25s ease;
      z-index: 100;
    }

    /* Yazdırma / PDF */
    @media print {
      html, body {
        overflow: visible;
        height: auto;
        background: white;
        color: #111;
      }

      @page {
        size: A4 landscape;
        margin: 0;
      }

      .controls,
      .progress,
      .hint,
      .brand-logo {
        display: none !important;
      }

      .deck {
        width: auto;
        height: auto;
        position: static;
      }

      .slide {
        position: relative;
        display: flex !important;
        width: 100vw;
        height: 100vh;
        page-break-after: always;
        break-after: page;
        background: white !important;
        padding: 1.5cm;
      }

      .slide:last-child {
        page-break-after: auto;
      }

      .slide.title-slide .logo-mark {
        box-shadow: none;
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }

      .slide.title-slide h1,
      .slide.end-slide h2 {
        color: #111;
      }

      .slide.title-slide .subtitle,
      .slide.title-slide .tagline,
      .slide.image-slide .caption,
      .slide.end-slide p {
        color: #555;
      }

      .slide.image-slide .frame {
        box-shadow: none;
        border: 1px solid #ddd;
        max-height: none;
        flex: 1;
      }

      .slide.image-slide img {
        max-height: calc(100vh - 3cm);
      }
    }
  </style>
</head>
<body>
  <div class="progress" id="progress"></div>
  <img class="brand-logo" src="logo-small.png" alt="Sütcü İmam Branda Tekstil" />

  <div class="deck" id="deck">
    <section class="slide title-slide active" data-slide="0">
      <div class="logo-mark"><img src="logo-small.png" alt="Logo" /></div>
      <h1>Sütcü İmam Branda Tekstil</h1>
      <p class="subtitle">
        Branda, çadır, tente ve özel baskılı tekstil ürünlerinde<br />
        üretim ve uygulama referanslarımız
      </p>
      <span class="tagline">Ürün Kataloğu · 2026</span>
    </section>

    <!-- Görseller JS ile eklenir -->
  </div>

  <div class="controls">
    <button id="prev" title="Önceki (←)">←</button>
    <span class="counter" id="counter">1 / 39</span>
    <button id="next" title="Sonraki (→)">→</button>
    <span class="hint">F: Tam ekran · MP4: bun run video</span>
  </div>

  <script>
    const IMAGES = [
      "WhatsApp Image 2026-07-16 at 16.13.46.jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.47 (2).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.47 (5).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.47 (8).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.47 (9).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.47.jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.48 (1).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.48 (4).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.48.jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.49 (1).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.49 (7).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.50 (3).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.50 (7).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.50 (8).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.50 (9).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.51 (1).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.51 (2).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.51 (3).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.51 (4).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.51 (6).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.51 (7).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.51.jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.52 (1).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.53 (2).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.53 (4).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.54 (4).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.54 (7).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.54.jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.55 (1).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.55 (2).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.55 (3).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.55 (4).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.55 (5).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.55 (6).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.55 (7).jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.55.jpeg",
      "WhatsApp Image 2026-07-16 at 16.13.56 (3).jpeg",
    ];

    const deck = document.getElementById("deck");
    const counter = document.getElementById("counter");
    const progress = document.getElementById("progress");
    let current = 0;

    IMAGES.forEach((filename, i) => {
      const slide = document.createElement("section");
      slide.className = "slide image-slide";
      slide.dataset.slide = String(i + 1);
      slide.innerHTML = `
        <div class="frame">
          <img src="images/${encodeURIComponent(filename)}" alt="Referans ${i + 1}" loading="lazy" />
        </div>
      `;
      deck.appendChild(slide);
    });

    const endSlide = document.createElement("section");
    endSlide.className = "slide end-slide";
    endSlide.dataset.slide = String(IMAGES.length + 1);
    endSlide.innerHTML = `
      <h2>Teşekkürler</h2>
      <p>Sütcü İmam Branda Tekstil San. ve Tic. Ltd. Şti.</p>
      <p style="margin-top:0.5rem;font-size:0.95rem;">Branda · Çadır · Tente · Özel Baskı</p>
    `;
    deck.appendChild(endSlide);

    const slides = () => deck.querySelectorAll(".slide");
    const total = () => slides().length;

    function goTo(index) {
      const all = slides();
      current = Math.max(0, Math.min(index, all.length - 1));
      all.forEach((s, i) => {
        const active = i === current;
        s.classList.toggle("active", active);
        if (s.classList.contains("image-slide") && active) {
          const img = s.querySelector("img");
          if (img) {
            img.style.animation = "none";
            void img.offsetWidth;
            img.style.animation = "";
          }
        }
      });
      counter.textContent = `${current + 1} / ${all.length}`;
      progress.style.width = `${((current + 1) / all.length) * 100}%`;
    }

    document.getElementById("prev").addEventListener("click", () => goTo(current - 1));
    document.getElementById("next").addEventListener("click", () => goTo(current + 1));

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight" || e.key === " " || e.key === "PageDown") {
        e.preventDefault();
        goTo(current + 1);
      } else if (e.key === "ArrowLeft" || e.key === "PageUp") {
        e.preventDefault();
        goTo(current - 1);
      } else if (e.key === "Home") {
        goTo(0);
      } else if (e.key === "End") {
        goTo(total() - 1);
      } else if (e.key === "f" || e.key === "F") {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen?.();
        } else {
          document.exitFullscreen?.();
        }
      } else if (e.key === "p" || e.key === "P") {
        window.print();
      }
    });

    let touchStartX = 0;
    deck.addEventListener("touchstart", (e) => {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    deck.addEventListener("touchend", (e) => {
      const diff = e.changedTouches[0].screenX - touchStartX;
      if (Math.abs(diff) > 50) goTo(current + (diff < 0 ? 1 : -1));
    }, { passive: true });

    goTo(0);
  </script>
</body>
</html>
